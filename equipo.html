      <span class="navbar-toggler-icon"></span>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-center">

        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active">Inicio</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/menu" routerLinkActive="active">Menú</a>

<!-- CONTENIDO -->
<div class="container equipo-container">

  <h2 class="titulo text-center mb-4">👥 Nuestro Equipo</h2>

  <div class="row g-4 justify-content-center">

    <!-- CARD -->
    <div class="col-md-4 col-sm-6"
         *ngFor="let miembro of equipo; let i = index">

      <div class="card equipo-card text-center"
           [style.animationDelay]="i * 0.1 + 's'">

        <!-- FOTO -->
        <img [src]="miembro.foto"
             class="avatar"
             (error)="cambiarImagen($event)">

        <!-- NOMBRE -->
        <h5 class="mt-3">{{ miembro.nombre }}</h5>

        <!-- ROL -->
        <span class="badge-rol">
          {{ miembro.rol }}
        </span>

      </div>

    </div>

  </div>

  <!-- BOTÓN -->
  <div class="text-center mt-5">
    <a routerLink="/" class="btn btn-success px-4">
      ⬅ Volver al inicio
    </a>
  </div>

</div>

<!-- FOOTER -->
<footer class="footer">

</footer>
