<!-- FORMULARIO -->
<div class="container mt-5 pt-5">

  <h2 class="text-center fw-bold mb-4">Contáctanos</h2>
  <p class="text-center text-muted mb-4">
    Déjanos tus datos y nos comunicaremos contigo.
  </p>

  <form (ngSubmit)="enviar()" #f="ngForm" class="mx-auto form-box">

    <div class="mb-3">
      <label class="form-label">Nombre completo</label>
      <input type="text"
             class="form-control"
             [(ngModel)]="nombre"
             name="nombre"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email"
             class="form-control"
             [(ngModel)]="email"
             name="email"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Mensaje</label>
      <textarea class="form-control"
                rows="3"
                [(ngModel)]="mensaje"
                name="mensaje"
                required></textarea>
    </div>

    <button type="submit"
            class="btn btn-success w-100"
            [disabled]="!f.valid">
      Enviar
    </button>

  </form>

  <!-- VOLVER -->
  <div class="text-center mt-4">
    <a routerLink="/" class="btn btn-outline-dark">
      ⬅ Volver al inicio
    </a>
  </div>

</div>
